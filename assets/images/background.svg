<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4ECDC4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#45B7D1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFA07A;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#98D8C8;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <rect width="1920" height="1080" fill="url(#grad1)"/>
  
  <circle cx="200" cy="150" r="120" fill="url(#grad2)" opacity="0.3">
    <animate attributeName="r" values="120;140;120" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="1700" cy="900" r="150" fill="url(#grad2)" opacity="0.3">
    <animate attributeName="r" values="150;170;150" dur="5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="1500" cy="200" r="100" fill="rgba(255,255,255,0.1)" opacity="0.5">
    <animate attributeName="cy" values="200;250;200" dur="6s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="400" cy="800" r="80" fill="rgba(255,255,255,0.1)" opacity="0.5">
    <animate attributeName="cx" values="400;450;400" dur="7s" repeatCount="indefinite"/>
  </circle>
  
  <path d="M 0,540 Q 480,400 960,540 T 1920,540" stroke="rgba(255,255,255,0.2)" stroke-width="3" fill="none">
    <animate attributeName="d" 
      values="M 0,540 Q 480,400 960,540 T 1920,540;
              M 0,540 Q 480,680 960,540 T 1920,540;
              M 0,540 Q 480,400 960,540 T 1920,540" 
      dur="8s" repeatCount="indefinite"/>
  </path>
  
  <path d="M 0,300 Q 480,200 960,300 T 1920,300" stroke="rgba(255,255,255,0.15)" stroke-width="2" fill="none">
    <animate attributeName="d" 
      values="M 0,300 Q 480,200 960,300 T 1920,300;
              M 0,300 Q 480,400 960,300 T 1920,300;
              M 0,300 Q 480,200 960,300 T 1920,300" 
      dur="10s" repeatCount="indefinite"/>
  </path>
  
  <polygon points="100,100 150,50 200,100 150,150" fill="rgba(255,255,255,0.1)" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="0 150 100" to="360 150 100" dur="20s" repeatCount="indefinite"/>
  </polygon>
  
  <polygon points="1800,950 1850,900 1900,950 1850,1000" fill="rgba(255,255,255,0.1)" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="0 1850 950" to="-360 1850 950" dur="25s" repeatCount="indefinite"/>
  </polygon>
  
  <rect x="800" y="100" width="80" height="80" fill="rgba(255,255,255,0.08)" opacity="0.7" rx="10">
    <animateTransform attributeName="transform" type="rotate" from="0 840 140" to="360 840 140" dur="15s" repeatCount="indefinite"/>
  </rect>
  
  <rect x="1100" y="850" width="60" height="60" fill="rgba(255,255,255,0.08)" opacity="0.7" rx="8">
    <animateTransform attributeName="transform" type="rotate" from="0 1130 880" to="-360 1130 880" dur="18s" repeatCount="indefinite"/>
  </rect>
</svg>